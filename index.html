<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri-Asistente De Maga  | 111 Recetas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d6a4f;
            --secondary: #95d5b2;
            --accent: #ff7b54;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1b4332;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

        header { background: var(--primary); color: white; padding: 3rem 1rem; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }

        .search-container { max-width: 800px; margin: -30px auto 25px; padding: 0 1rem; }
        input[type="text"] { width: 100%; padding: 18px 28px; border-radius: 50px; border: none; box-shadow: 0 8px 25px rgba(0,0,0,0.1); font-size: 1rem; outline: none; }

        .filters { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; padding: 0 1rem; }
        .filter-btn { padding: 8px 20px; border-radius: 20px; border: 1.5px solid var(--primary); background: white; color: var(--primary); cursor: pointer; transition: all 0.3s; font-weight: 600; }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); color: white; }

        .magic-btn { display: block; margin: 0 auto 30px; background: var(--accent); color: white; border: none; padding: 14px 28px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 123, 84, 0.4); transition: transform 0.2s; }
        .magic-btn:active { transform: scale(0.95); }

        #menu-result { max-width: 800px; margin: 0 auto 30px; padding: 25px; background: #e9f5ee; border-radius: 25px; display: none; border: 2px dashed var(--primary); text-align: center; }

        .recipes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 0 2rem 4rem; max-width: 1200px; margin: 0 auto; }
        .recipe-card { background: var(--card); border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: all 0.3s ease; cursor: pointer; position: relative; border: 1px solid transparent; }
        .recipe-card:hover { transform: translateY(-8px); border-color: var(--secondary); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .recipe-content { padding: 25px; }
        
        .recipe-number { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; font-weight: 900; color: var(--primary); opacity: 0.1; }
        .category-tag { font-size: 0.65rem; text-transform: uppercase; background: var(--secondary); color: var(--primary); padding: 5px 12px; border-radius: 50px; font-weight: bold; }
        .recipe-card h3 { margin: 15px 0 10px; font-size: 1.2rem; line-height: 1.3; padding-right: 30px; }
        .recipe-card p { font-size: 0.85rem; color: #666; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 30px; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; animation: popUp 0.3s ease; }
        @keyframes popUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; color: #ccc; transition: 0.2s; }
        .close-modal:hover { color: var(--accent); }
        
        .modal h2 { color: var(--primary); margin-bottom: 20px; padding-right: 30px; font-size: 1.8rem; }
        .modal-section { margin-bottom: 25px; }
        .modal-section h4 { color: var(--accent); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 8px; }
        .modal-section p { font-size: 1.05rem; color: #444; }

        @media (max-width: 600px) {
            .recipes-grid { padding: 0 1rem 3rem; }
            header h1 { font-size: 1.6rem; }
            .modal-content { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<header>
    <h1>🥗 Nutri-Asistente Maga </h1>
    <p>111 Recetas de Nutrillermo para mi madre con amor </p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Busca ingrediente o receta (ej: aguacate, salmón)...">
</div>

<div class="filters">
    <button class="filter-btn active" onclick="filterCategory('all')">Todo</button>
    <button class="filter-btn" onclick="filterCategory('Desayunos')">Desayunos</button>
    <button class="filter-btn" onclick="filterCategory('Proteínas')">Proteínas</button>
    <button class="filter-btn" onclick="filterCategory('Vegetales')">Vegetales</button>
    <button class="filter-btn" onclick="filterCategory('Cremas')">Cremas</button>
</div>

<button class="magic-btn" onclick="generateRandomMenu()">✨ Generar Menú Sorpresa</button>

<div id="menu-result"></div>

<div class="recipes-grid" id="recipesGrid"></div>

<div id="recipeModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="document.getElementById('recipeModal').style.display='none'">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const recetario = [
        { n: 1, cat: "Desayunos", titulo: "Huevos con Bacon y Aguacate", ing: "2 huevos, 1/2 aguacate, 2-3 tiras de bacon", prep: "Freír las tiras de bacon. Cuando estén listas, retirar de la sartén y freír los huevos en la misma grasa. Servir acompañado del aguacate." },
        { n: 2, cat: "Desayunos", titulo: "Omelette con Hongos", ing: "2 huevos, hongos al gusto, aceitunas negras, aceite de oliva, queso mozzarella", prep: "Batir los huevos con una pizca de sal. Freír en forma de tortilla. Agregar los hongos, aceitunas y queso. Doblar por la mitad." },
        { n: 3, cat: "Desayunos", titulo: "Omelette con Zucchini", ing: "2 huevos, zucchini, albahaca, aceite de oliva, queso feta", prep: "Batir los huevos con sal. Freír en sartén. Agregar zucchini, albahaca y queso feta. Doblar por la mitad." },
        { n: 4, cat: "Desayunos", titulo: "Omelette Capresa", ing: "2 huevos, 1 tomate, albahaca, aceite de oliva, mozzarella", prep: "Batir huevos. Freír en forma de tortilla. Rellenar con tomate picado, albahaca y queso. Doblar." },
        { n: 5, cat: "Desayunos", titulo: "Huevos Fritos con Bacon y Espinacas", ing: "1-2 huevos, 2 tiras de bacon, espinaca al gusto, aceite de oliva", prep: "Freír el bacon. Retirar y freír los huevos en la misma grasa/aceite. Servir sobre una cama de espinacas frescas." },
        { n: 6, cat: "Desayunos", titulo: "Cheesy Eggs", ing: "1-2 huevos, mozzarella, sal, pimienta, cilantro, aceite de oliva", prep: "En un molde para cupcake, agregar aceite de oliva y el huevo. Añadir queso y condimentos. Hornear por 10-15 min." },
        { n: 7, cat: "Desayunos", titulo: "Cheesy Bacon Eggs", ing: "1-2 huevos, 2-4 tiras de bacon, mozzarella, sal, pimienta, cilantro", prep: "Colocar el bacon en forma circular dentro de un molde de cupcake. Agregar el huevo, queso y especias. Hornear 10-15 min." },
        { n: 8, cat: "Desayunos", titulo: "Aguacate Relleno de Huevo", ing: "1 huevo duro en trocitos, cream cheese, apio picado, 1 aguacate mediano", prep: "Mezclar el huevo con el apio y el queso. Partir el aguacate, retirar la semilla y rellenar el centro con la mezcla." },
        { n: 9, cat: "Desayunos", titulo: "Huevos con Salmón", ing: "Arúgula, 2 lonjas de salmón ahumado, 1-2 huevos revueltos, parmesano", prep: "Colocar base de arúgula. Poner el salmón con los huevos encima y espolvorear el queso." },
        { n: 10, cat: "Desayunos", titulo: "Quiche de Coliflor", ing: "1 coliflor pequeña, 3 huevos, mozzarella, albahaca", prep: "Procesar la coliflor para formar la base en un molde. Batir los huevos, agregarlos con la albahaca y queso. Hornear 15-20 min." },
        { n: 11, cat: "Desayunos", titulo: "Huevos en Taza", ing: "Espinacas, 2 huevos, queso feta", prep: "En una taza, colocar los huevos, la espinaca y el queso. Mezclar y llevar al microondas por 5-8 min." },
        { n: 12, cat: "Desayunos", titulo: "Pancakes de Requesón", ing: "200g requesón, 2 huevos, 1 cda linaza, mantequilla", prep: "Mezclar huevos, requesón y linaza. Reposar 5 min. Freír en sartén con mantequilla por ambos lados." },
        { n: 13, cat: "Desayunos", titulo: "Berrypancakes", ing: "3 cdas harina almendras, 2 huevos, cream cheese, vainilla, berries", prep: "Licuar harina y huevos, ajustar con cream cheese. Cocinar en sartén y agregar las berries al final." },
        { n: 14, cat: "Desayunos", titulo: "Pancakes de Coliflor", ing: "1/2 coliflor al vapor, 2 huevos, 2 cdas harina almendras, canela, mantequilla", prep: "Licuar coliflor, huevos y harina. Agregar canela. Cocinar en sartén con mantequilla poco a poco." },
        { n: 15, cat: "Desayunos", titulo: "Coffee Pancakes", ing: "3 cdas harina de coco, 2 huevos, cream cheese, vainilla, 1 cdita café", prep: "Licúa los ingredientes. Ajusta consistencia con el cream cheese. Cocina en sartén antiadherente." },
        { n: 16, cat: "Desayunos", titulo: "Chocopancakes", ing: "3 cdas harina de coco, 2 huevos, 1 cda cacao puro, 1 cda mantequilla", prep: "Licúa todos los ingredientes. Cocina en sartén a fuego medio-bajo poco a poco." },
        { n: 17, cat: "Desayunos", titulo: "Pancakes de Coco", ing: "3 cdas harina de coco, 2 huevos, 1 cda coco rallado, aceite de coco", prep: "Licúa huevos y harina. Agrega el coco rallado. Cocina en sartén con aceite de coco." },
        { n: 18, cat: "Desayunos", titulo: "Pancakenuts", ing: "2 huevos, 3 cdas harina de almendras, nueces troceadas, canela, mantequilla", prep: "Licúa harina y huevos. Agrega nueces y canela. Cocina en sartén con mantequilla." },
        { n: 19, cat: "Desayunos", titulo: "Pancakes de Brócoli", ing: "3 cdas harina de almendras, 2 huevos, 1/4 brócoli al vapor, ghee", prep: "Licúa todos los ingredientes. Cocina en sartén con ghee hasta que doren." },
        { n: 20, cat: "Desayunos", titulo: "Pancakes de Canela", ing: "3 cdas harina de coco, 2 huevos, cream cheese, 2 cditas canela, ghee", prep: "Licúa los ingredientes. Cocina en sartén pequeña para que queden esponjosos." },
        { n: 21, cat: "Desayunos", titulo: "Avopancakes", ing: "3 cdas harina de coco, 2 huevos, 1/2 aguacate, vainilla", prep: "Licúa todo. Si la mezcla está muy espesa, agrega un poco de agua. Cocina en sartén." },
        { n: 22, cat: "Desayunos", titulo: "Pancakes de Mantequilla", ing: "3 cdas harina de almendras, 2 huevos, 2 cdas mantequilla, cream cheese", prep: "Licúa y cocina. Estos pancakes son muy densos en grasa, ideales para saciedad prolongada." },
        { n: 23, cat: "Vegetales", titulo: "Cereal de Coliflor", ing: "1/2 coliflor ralliada, leche de coco sin azúcar, almendras, vainilla", prep: "Cocer la coliflor ralliada por 3 min. Escurrir. Colocar en bowl con leche de coco y almendras." },
        { n: 24, cat: "Vegetales", titulo: "Hash Brown de Coliflor", ing: "1 coliflor pequeña, 2 huevos, sal, pimienta, aceite de oliva", prep: "Mezcla la coliflor rallada con huevo y especias. Forma tortitas y fríe en sartén hasta que doren." },
        { n: 25, cat: "Vegetales", titulo: "Bacon Avocado", ing: "1 aguacate en tajadas, tiras de bacon", prep: "Enrolla el bacon en las tajadas de aguacate. Fríe en sartén hasta que el bacon esté crujiente." },
        { n: 26, cat: "Desayunos", titulo: "Aguacate Relleno de Huevo y Salmón", ing: "1 aguacate, 1 huevo, 2 lonjas de salmón ahumado", prep: "Quita la semilla del aguacate. Coloca el salmón y el huevo en el centro. Hornea 5-8 min." },
        { n: 27, cat: "Vegetales", titulo: "Pastel de Coliflor", ing: "1 coliflor procesada, 2 huevos, 2 cdas harina almendras, aceite de oliva", prep: "Mezcla los ingredientes en un molde. Hornea 15-20 min hasta que esté firme y dorado." },
        { n: 28, cat: "Vegetales", titulo: "Chocomousse de Aguacate", ing: "1 aguacate, 1 cda cacao puro, 1 cda coco rallado", prep: "Licúa el aguacate con el cacao hasta que esté cremoso. Sirve y decora con coco." },
        { n: 29, cat: "Vegetales", titulo: "Tortilla de Coliflor con Bacon", ing: "1/2 coliflor ralliada, 1 huevo, perejil, 2 tiras de bacon", prep: "Mezcla coliflor, huevo y perejil. Fríe como tortilla. Sirve con el bacon frito encima." },
        { n: 30, cat: "Vegetales", titulo: "Hash Brown de Repollo", ing: "1 repollo rallado, 1 huevo, sal, pimienta, aceite de oliva", prep: "Mezcla repollo y huevo. Forma tortitas y fríe por ambos lados." },
        { n: 31, cat: "Vegetales", titulo: "Tortillas con Guacamole", ing: "3 cdas harina almendras, 1 huevo, 1 aguacate, albahaca", prep: "Haz la tortilla con huevo y harina. Rellena con el aguacate triturado y albahaca." },
        { n: 32, cat: "Vegetales", titulo: "Ensalada con Huevo y Salmón", ing: "Mix de verdes, 1 huevo duro, 2 lonjas salmón, aceite de oliva", prep: "Mezcla los verdes con el salmón y el huevo en trozos. Aliña con aceite de oliva." },
        { n: 33, cat: "Vegetales", titulo: "Cheesy Coliflor con Bacon", ing: "1/2 coliflor, mozzarella, 1 cda mantequilla, 2 tiras de bacon", prep: "Saltea la coliflor procesada con mantequilla. Agrega queso y mezcla con el bacon troceado." },
        { n: 34, cat: "Cremas", titulo: "Ketocafé", ing: "1 taza de café, 1 cda de mantequilla", prep: "Licúa el café caliente con la mantequilla hasta que haga espuma." },
        { n: 35, cat: "Cremas", titulo: "Chococafé", ing: "1 taza de café, 1 cdita aceite de coco, 1 cdita cacao puro", prep: "Licúa todos los ingredientes hasta obtener una mezcla homogénea." },
        { n: 36, cat: "Cremas", titulo: "Cococafé", ing: "1 taza de café, 1 cdita aceite de coco, 1 cdita mantequilla", prep: "Licúa para obtener la versión más densa en energía del Ketocafé." },
        { n: 37, cat: "Proteínas", titulo: "Pollo a la Mantequilla", ing: "1 pechuga de pollo, ajo, mantequilla, sal y pimienta", prep: "Dora los ajos en mantequilla. Cocina la pechuga condimentada en esa mezcla." },
        { n: 38, cat: "Vegetales", titulo: "Vainitas con Coco", ing: "Vainitas (green beans), 1 diente de ajo, aceite de coco", prep: "Saltea las vainitas con el aceite de coco y el ajo picado." },
        { n: 39, cat: "Proteínas", titulo: "Pollo al Horno con Hongos", ing: "1 pechuga en trozos, 1 taza hongos, mantequilla, parmesano", prep: "Coloca todo en un molde. Hornea 30-45 min hasta que el pollo esté cocido." },
        { n: 40, cat: "Proteínas", titulo: "Tortitas de Pollo con Guacamole", ing: "Pollo molido, parmesano, 1/2 aguacate, cream cheese", prep: "Haz tortitas con el pollo y queso. Fríe. Sirve con el aguacate mezclado con cream cheese." },
        { n: 41, cat: "Proteínas", titulo: "Cacerola de Pollo y Brócoli", ing: "Pollo, brócoli, mozzarella, parmesano, mantequilla", prep: "En una cacerola coloca pollo y brócoli. Cubre con queso y mantequilla. Hornea/gratina." },
        { n: 42, cat: "Proteínas", titulo: "Pollo y Espárragos al Coco", ing: "Pollo, espárragos, aceite de coco, jengibre", prep: "Cocina el pollo con jengibre en aceite de coco. Agrega espárragos al final y saltea." },
        { n: 43, cat: "Proteínas", titulo: "Pechuga rellena de Espinaca", ing: "Pechuga de pollo, espinacas, queso de cabra, aceite de oliva", prep: "Abre la pechuga, rellena con espinaca y queso. Cierra con palillo y hornea 20-30 min." },
        { n: 44, cat: "Proteínas", titulo: "Pollo al Limón con Celery", ing: "Pechuga de pollo, zumo de limón, apio, mantequilla", prep: "Marina el pollo en limón. Coloca en molde con apio y mantequilla. Hornea 20-30 min." },
        { n: 45, cat: "Proteínas", titulo: "Corvina al Coco con Ajonjolí", ing: "Filete de corvina, ajonjolí, aceite de coco", prep: "Cocina el pescado en aceite de coco. Espolvorea ajonjolí por ambos lados." },
        { n: 46, cat: "Proteínas", titulo: "Salmón con Ajo y Jengibre", ing: "Filete de salmón, ajo, jengibre, mantequilla", prep: "Condimenta y cocina en sartén con mantequilla a fuego medio." },
        { n: 47, cat: "Proteínas", titulo: "Salmón con Espinacas", ing: "Salmón, espinacas, queso de cabra, aceite de oliva", prep: "Cocina el salmón al grill. Saltea espinacas con aceite y queso de cabra. Sirve junto." },
        { n: 48, cat: "Proteínas", titulo: "Mahi Mahi con Vegetales", ing: "Mahi mahi, vegetales al gusto, aceite de oliva, parmesano", prep: "Coloca todo en una cacerola. Rocía aceite y queso. Hornea 15-20 min." },
        { n: 49, cat: "Proteínas", titulo: "Corvina con Brócoli", ing: "Corvina, brócoli, aceite de coco", prep: "Cocina el pescado al grill. Saltea el brócoli con el aceite de coco como acompañante." },
        { n: 50, cat: "Proteínas", titulo: "Salmón al Limón", ing: "Salmón salvaje, zumo de limón, mantequilla", prep: "Marina el salmón en limón. Cocina en plancha con mantequilla." },
        { n: 51, cat: "Proteínas", titulo: "Bowl de Vegetales y Camarones", ing: "10-12 camarones, vegetales mixtos, ajo, mantequilla", prep: "Cocina camarones con ajo y mantequilla. Sirve sobre los vegetales salteados." },
        { n: 52, cat: "Proteínas", titulo: "Ensalada con Camarones", ing: "Camarones, arúgula, tomates cherry, queso feta, aceite de oliva", prep: "Cocina camarones con ajo. Mezcla con la arúgula, tomates y queso." },
        { n: 53, cat: "Proteínas", titulo: "Camarones al Coco", ing: "Camarones, ajo, aceite de coco", prep: "Cocina los camarones en aceite de coco con mucho ajo." },
        { n: 54, cat: "Proteínas", titulo: "Pimentones Verdes Rellenos", ing: "Pimentones, carne molida, apio, mozzarella", prep: "Rellena los pimentones con carne y queso. Hornea 20-30 min con aceite de oliva." },
        { n: 55, cat: "Proteínas", titulo: "Carne con Albahaca", ing: "Carne de res, albahaca, mantequilla", prep: "Cocina la carne a tu gusto con mantequilla. Decora con hojas de albahaca fresca." },
        { n: 56, cat: "Proteínas", titulo: "Bowl de Carne y Bacon", ing: "Carne molida, apio, bacon, mozzarella", prep: "Fríe el bacon. En esa grasa cocina la carne con apio. Mezcla con el queso." },
        { n: 57, cat: "Proteínas", titulo: "Costillas con Bacon", ing: "Costillas de cerdo, tiras de bacon", prep: "Enrolla cada costilla con bacon y cocina al grill o sartén hasta que dore." },
        { n: 58, cat: "Proteínas", titulo: "Pinchos de Carne y Zucchini", ing: "Carne en trozos, zucchini, mozzarella fresca", prep: "Arma los pinchos alternando ingredientes. Cocina a la plancha con aceite de oliva." },
        { n: 59, cat: "Proteínas", titulo: "Berenjena rellena de Carne", ing: "1 berenjena, carne molida, cebollino, parmesano", prep: "Vacia la berenjena, mezcla el centro con carne y rellena. Hornea con queso." },
        { n: 60, cat: "Proteínas", titulo: "Carne al Grill con Ketosalad", ing: "Carne, berro, queso feta, nueces, apio", prep: "Cocina la carne. Sirve con la ensalada de berro, nueces y queso." },
        { n: 61, cat: "Proteínas", titulo: "Carne con Hongos y Tomate", ing: "Carne en trozos, tomates cherry, hongos, cilantro", prep: "Cocina todo junto en sartén tapada por 8 min con aceite de oliva." },
        { n: 62, cat: "Proteínas", titulo: "Cheesy Beef", ing: "Carne en trozos, mozzarella, perejil, aceite de oliva", prep: "Cocina la carne. Agrega el queso al final para que gratine. Decora con perejil." },
        { n: 63, cat: "Proteínas", titulo: "Hamburguesas de Espinaca", ing: "Carne molida, espinacas picadas, aceite de oliva", prep: "Mezcla carne y espinaca. Forma tortitas y cocina por ambos lados." },
        { n: 64, cat: "Proteínas", titulo: "Baconburger", ing: "Carne molida, bacon troceado, sal y pimienta", prep: "Mezcla carne con el bacon crudo picado. Forma hamburguesas y cocina al grill." },
        { n: 65, cat: "Proteínas", titulo: "Lettuce Burger", ing: "Carne molida, hojas de lechuga grandes", prep: "Cocina la carne. Usa las hojas de lechuga como 'pan' para envolver la hamburguesa." },
        { n: 66, cat: "Proteínas", titulo: "Portobello Burger", ing: "Carne molida, 2 hongos portobello grandes", prep: "Usa los hongos portobello como tapas para tu hamburguesa de carne." },
        { n: 67, cat: "Vegetales", titulo: "Pizza de Coliflor", ing: "Coliflor ralliada, 1 huevo, mozzarella, salsa tomate casera", prep: "Hornea la base de coliflor y huevo 15 min. Agrega salsa y queso, hornea 5 min más." },
        { n: 68, cat: "Vegetales", titulo: "Puré de Coliflor con Bacon", ing: "Coliflor, bacon, cream cheese, cebollín", prep: "Cuece la coliflor al vapor y tritura con cream cheese. Agrega bacon frito y cebollín." },

    const grid = document.getElementById('recipesGrid');
    const searchInput = document.getElementById('searchInput');

    function displayRecipes(data) {
        grid.innerHTML = '';
        data.forEach(r => {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.onclick = () => openModal(r);
            card.innerHTML = `
                <div class="recipe-number">${r.n}</div>
                <div class="recipe-content">
                    <span class="category-tag">${r.cat}</span>
                    <h3>${r.titulo}</h3>
                    <p>${r.ing}</p>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function openModal(recipe) {
        const body = document.getElementById('modalBody');
        body.innerHTML = `
            <h2>${recipe.n}. ${recipe.titulo}</h2>
            <div class="modal-section">
                <h4>🛒 Ingredientes</h4>
                <p>${recipe.ing}</p>
            </div>
            <div class="modal-section">
                <h4>👨‍🍳 Preparación</h4>
                <p>${recipe.prep}</p>
            </div>
            <div style="background: #fdf2f0; padding: 15px; border-radius: 15px; font-size: 0.85rem; color: #666; border-left: 4px solid var(--accent);">
                Tip: Alimentos de alta densidad nutricional para saciedad prolongada.
            </div>
        `;
        document.getElementById('recipeModal').style.display = 'flex';
    }

    function closeModal(e) {
        if(e.target.className === 'modal') {
            document.getElementById('recipeModal').style.display = 'none';
        }
    }

    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = recetario.filter(r => 
            r.titulo.toLowerCase().includes(term) || 
            r.ing.toLowerCase().includes(term)
        );
        displayRecipes(filtered);
    });

    function filterCategory(cat) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        if(cat === 'all') {
            displayRecipes(recetario);
        } else {
            const filtered = recetario.filter(r => 
                r.cat === cat || 
                (cat === 'Proteínas' && (r.cat === 'Proteínas' || r.cat === 'Pescados' || r.cat === 'Carnes'))
            );
            displayRecipes(filtered);
        }
    }

    function generateRandomMenu() {
        const desayunos = recetario.filter(r => r.cat === "Desayunos");
        const comidas = recetario.filter(r => r.cat === "Proteínas" || r.cat === "Carnes" || r.cat === "Pescados");
        
        const d = desayunos[Math.floor(Math.random() * desayunos.length)];
        const c = comidas[Math.floor(Math.random() * comidas.length)];
        
        const res = document.getElementById('menu-result');
        res.style.display = 'block';
        res.innerHTML = `
            <h2 style="color:var(--primary); font-size:1.4rem;">🍴 Tu Menú del Día</h2>
            <div style="margin-top:10px;">
                <p><strong>Desayuno:</strong> ${d.titulo}</p>
                <p><strong>Comida/Cena:</strong> ${c.titulo}</p>
            </div>
        `;
        res.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    displayRecipes(recetario);
</script>
