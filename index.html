<html lang="es">
<head>

    <style>
        /* DISEÑO PROFESIONAL PARA MAGA */
        :root {
            --primario: #556b2f; /* Verde oliva gourmet */
            --secundario: #e9edc9; /* Crema suave */
            --fondo: #fefae0; /* Blanco hueso cálido */
            --texto: #283618; /* Verde oscuro para lectura fácil */
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* CABECERA */
        header {
            background-color: var(--primario);
            color: var(--blanco);
            text-align: center;
            padding: 30px 15px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-size: 28px; }
        header p { margin: 5px 0 0; opacity: 0.9; font-style: italic; font-size: 16px; }

        /* BUSCADOR */
        .buscador-contenedor {
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #buscador {
            width: 90%;
            max-width: 500px;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid var(--primario);
            border-radius: 50px;
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* CATEGORÍAS RÁPIDAS */
        .categorias-nav {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 0 20px 20px;
            scrollbar-width: none;
        }
        .categorias-nav::-webkit-scrollbar { display: none; }

        .btn-cat {
            background-color: var(--secundario);
            border: 1px solid var(--primario);
            padding: 8px 18px;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: bold;
            color: var(--primario);
            cursor: pointer;
            font-size: 14px;
        }

        /* LISTA DE RECETAS */
        .lista-recetas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 10px 20px 40px;
        }

        .tarjeta-receta {
            background: var(--blanco);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid var(--primario);
            transition: 0.2s;
        }

        .tarjeta-receta:active { transform: scale(0.98); }

        /* VISTA DETALLE */
        #vista-receta {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--fondo);
            overflow-y: auto;
            z-index: 1000;
        }

        .btn-volver {
            background-color: var(--primario);
            color: white;
            width: 100%;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            position: sticky;
            top: 0;
            text-align: left;
        }

        .contenido-receta { padding: 25px; max-width: 600px; margin: auto; }
        .contenido-receta h2 { font-size: 28px; color: var(--primario); margin-top: 0; }
        .seccion-tit { 
            background: var(--secundario); 
            padding: 5px 15px; 
            border-radius: 10px; 
            display: inline-block; 
            font-weight: bold;
            margin-top: 15px;
        }
        .contenido-receta ul, .contenido-receta ol { font-size: 19px; line-height: 1.6; padding-left: 20px; }
        .contenido-receta li { margin-bottom: 12px; }

    </style>
</head>

            { titulo: "109. Ensalada de Pepino y Vinagreta", categoria: "Ensaladas", ingredientes: ["Pepino", "Vinagre", "Aceite"], preparacion: ["Rodajas finas."] },
            { titulo: "110. Postre de Frambuesa y Crema", categoria: "Postres", ingredientes: ["Frambuesas", "Crema montada"], preparacion: ["Mezclar suavemente."] },
            { titulo: "111. Chocolate Negro con Sal", categoria: "Snack", ingredientes: ["Chocolate 85%", "Sal marina"], preparacion: ["Derretir y añadir sal."] }
        ];

        function mostrarLista(recetasAMostrar) {
            const contenedor = document.getElementById("contenedor-recetas");
            contenedor.innerHTML = "";
            recetasAMostrar.forEach((receta) => {
                const div = document.createElement("div");
                div.className = "tarjeta-receta";
                div.innerHTML = `<span>${receta.titulo}</span> <span>➜</span>`;
                div.onclick = () => abrirReceta(receta);
                contenedor.appendChild(div);
            });
        }

        function filtrarRecetas() {
            const texto = document.getElementById("buscador").value.toLowerCase();
            const filtradas = recetas.filter(r => 
                r.titulo.toLowerCase().includes(texto) || 
                r.categoria.toLowerCase().includes(texto)
            );
            mostrarLista(filtradas);
        }

        function filtrarPorCat(cat) {
            if(cat === 'Todas') return mostrarLista(recetas);
            const filtradas = recetas.filter(r => r.categoria === cat);
            mostrarLista(filtradas);
        }

        function abrirReceta(receta) {
            const detalle = document.getElementById("detalle-receta");
            detalle.innerHTML = `
                <h2>${receta.titulo}</h2>
                <div class="seccion-tit">🛒 Ingredientes</div>
                <ul>${receta.ingredientes.map(i => `<li>${i}</li>`).join('')}</ul>
                <div class="seccion-tit">👩‍🍳 Preparación</div>
                <ol>${receta.preparacion.map(p => `<li>${p}</li>`).join('')}</ol>
            `;
            document.getElementById("pantalla-principal").style.display = "none";
            document.getElementById("vista-receta").style.display = "block";
            document.getElementById("vista-receta").scrollTo(0, 0);
        }

        function cerrarReceta() {
            document.getElementById("vista-receta").style.display = "none";
            document.getElementById("pantalla-principal").style.display = "block";
        }

        mostrarLista(recetas);
    </script>
</body>
</html>
