<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutri-Asistente De Maga | 111 Recetas</title>
    
    <meta name="theme-color" content="#2d6a4f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1046/1046747.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2d6a4f;
            --secondary: #95d5b2;
            --accent: #ff7b54;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1b4332;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        header { background: var(--primary); color: white; padding: 3rem 1rem; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header h1 { font-size: 2rem; margin-bottom: 0.5rem; }

        /* Buscador Pro */
        .search-container { max-width: 800px; margin: -30px auto 25px; padding: 0 1.5rem; }
        input[type="text"] { width: 100%; padding: 18px 28px; border-radius: 50px; border: none; box-shadow: 0 8px 25px rgba(0,0,0,0.1); font-size: 1rem; outline: none; transition: 0.3s; }
        input[type="text"]:focus { box-shadow: 0 8px 25px rgba(45, 106, 79, 0.2); }

        /* Filtros */
        .filters { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 30px; padding: 0 1rem; }
        .filter-btn { padding: 10px 18px; border-radius: 25px; border: 1.5px solid var(--primary); background: white; color: var(--primary); cursor: pointer; transition: all 0.3s; font-weight: 600; font-size: 0.9rem; }
        .filter-btn.active { background: var(--primary); color: white; }

        .magic-btn { display: block; margin: 0 auto 30px; background: var(--accent); color: white; border: none; padding: 14px 28px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 123, 84, 0.4); }

        #menu-result { max-width: 600px; margin: 0 auto 30px; padding: 20px; background: #e9f5ee; border-radius: 20px; display: none; border: 2px dashed var(--primary); text-align: center; animation: fadeIn 0.5s; }

        /* Grid de Recetas */
        .recipes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 0 1.5rem 4rem; max-width: 1200px; margin: 0 auto; }
        .recipe-card { background: var(--card); border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 1px solid transparent; position: relative; }
        .recipe-card:hover { transform: translateY(-5px); border-color: var(--secondary); }
        .recipe-content { padding: 20px; }
        .recipe-number { position: absolute; top: 15px; right: 20px; font-size: 1.2rem; font-weight: 900; color: var(--primary); opacity: 0.1; }
        .category-tag { font-size: 0.7rem; text-transform: uppercase; background: var(--secondary); color: var(--primary); padding: 4px 12px; border-radius: 50px; font-weight: bold; }

        /* Modal y Control de Porciones */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 30px; padding: 30px; position: relative; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        .servings-control { background: #f0f7f4; padding: 15px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; margin: 20px 0; border: 1px solid var(--secondary); }
        .servings-control span { font-weight: 600; color: var(--primary); }
        .servings-btns { display: flex; gap: 15px; }
        .s-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 1.2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .s-btn:active { transform: scale(0.9); }

        .wake-lock-status { font-size: 0.75rem; color: #2d6a4f; display: flex; align-items: center; gap: 8px; margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee; }
        .dot { height: 10px; width: 10px; background-color: #4CAF50; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.7; } 70% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.7; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            header { padding: 2rem 1rem; }
            header h1 { font-size: 1.6rem; }
            .modal-content { padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <h1>🥗 Nutri-Asistente Maga</h1>
    <p>Comida real para una salud real</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Ej: salmón aguacate, desayuno keto...">
</div>

<div class="filters" id="filtersContainer">
    <button class="filter-btn active" data-cat="all">Todo</button>
    <button class="filter-btn" data-cat="Desayunos">Desayunos</button>
    <button class="filter-btn" data-cat="Proteínas">Proteínas</button>
    <button class="filter-btn" data-cat="Vegetales">Vegetales</button>
    <button class="filter-btn" data-cat="Cremas">Cremas</button>
</div>

<button class="magic-btn" onclick="generateRandomMenu()">✨ Menú Sorpresa</button>

<div id="menu-result"></div>

<div class="recipes-grid" id="recipesGrid"></div>

<div id="recipeModal" class="modal" onclick="handleOutsideClick(event)">
    <div class="modal-content">
        <span style="position:absolute; top:15px; right:25px; cursor:pointer; font-size:2.5rem; color:#ccc;" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
        <div class="wake-lock-status">
            <span class="dot"></span> 
            <span>Modo Cocina Activo: La pantalla no se apagará.</span>
        </div>
    </div>
</div>

<script>
    // --- PEGA TUS RECETAS AQUÍ ---
      const recetario = [
    // --- DESAYUNOS (1-22) ---
    { n: 1, cat: "Desayunos", titulo: "Huevos con Bacon y Aguacate", ing: "2 huevos orgánicos o de pastoreo, 1/2 aguacate maduro, 2-3 tiras de bacon (tocino) sin azúcar añadida, sal de mar y pimienta negra al gusto.", prep: "En una sartén fría, coloque las tiras de bacon y encienda el fuego a nivel medio. Cocine hasta que estén crujientes por ambos lados. Retire el bacon y, utilizando la grasa natural que quedó en la sartén, fría los huevos al término de su preferencia. Sirva inmediatamente junto con el medio aguacate rebanado, sazonando todo con sal y pimienta." },
    { n: 2, cat: "Desayunos", titulo: "Omelette con Hongos", ing: "2 a 3 huevos, 1/2 taza de hongos (champiñones o portobello) rebanados, 1/4 taza de queso mozzarella rallado, 5 aceitunas negras picadas, 1 cucharada de aceite de oliva virgen extra, sal y pimienta.", prep: "Bata los huevos en un recipiente con sal y pimienta. Caliente el aceite de oliva en una sartén antiadherente a fuego medio y saltee los hongos por 2 minutos. Vierta los huevos batidos cubriendo toda la superficie. Cuando la base esté firme, distribuya el queso y las aceitunas en una mitad. Doble el omelette, tape por 30 segundos para fundir el queso y sirva." },
    { n: 3, cat: "Desayunos", titulo: "Omelette con Zucchini", ing: "2 huevos, 1/2 zucchini pequeño rallado o en cubitos, hojas de albahaca fresca, 30g de queso feta desmenuzado, 1 cucharada de aceite de oliva, sal.", prep: "Saltee el zucchini en la sartén con aceite de oliva hasta que ablande ligeramente. Agregue los huevos previamente batidos con sal. Antes de que el huevo seque por completo, añada el queso feta y las hojas de albahaca. Doble a la mitad y cocine por un minuto más." },
    { n: 4, cat: "Desayunos", titulo: "Omelette Capresa", ing: "2 huevos, 1 tomate maduro pequeño picado en cubos, 5-6 hojas de albahaca fresca, 1/4 taza de mozzarella, 1 cucharada de aceite de oliva virgen extra, sal de mar.", prep: "Bata los huevos y viértalos en la sartén caliente con aceite de oliva. Una vez que la tortilla empiece a cuajar, coloque el tomate, la albahaca y el queso en el centro. Doble los extremos hacia el centro o a la mitad y cocine hasta que el queso se derrita." },
    { n: 5, cat: "Desayunos", titulo: "Huevos Fritos con Bacon y Espinacas", ing: "2 huevos, 2 tiras de bacon de buena calidad, 1 taza de espinacas frescas, 1 cucharadita de aceite de oliva (opcional), sal y pimienta.", prep: "Cocine el bacon en la sartén hasta que esté bien dorado y retire. En la misma grasa, agregue las espinacas hasta que reduzcan su tamaño (30 segundos) y muévalas a un lado del plato. Fría los huevos en la grasa restante. Sirva los huevos sobre la cama de espinacas con el bacon a un lado." },
    { n: 6, cat: "Desayunos", titulo: "Cheesy Eggs", ing: "2 huevos, 2 cucharadas de queso mozzarella rallado, cilantro fresco picado, sal, pimienta, aceite de oliva para engrasar.", prep: "Engrase un molde para muffins o una taza apta para horno con aceite de oliva. Rompa los huevos dentro del molde (manteniendo la yema entera). Cubra con el queso mozzarella, sal y pimienta. Hornee a 180°C durante 10 a 15 minutos o hasta que la clara esté blanca y firme. Decore con cilantro fresco." },
    { n: 7, cat: "Desayunos", titulo: "Cheesy Bacon Eggs", ing: "2 huevos, 4 tiras de bacon, 2 cucharadas de queso mozzarella, sal, pimienta y cilantro fresco.", prep: "Forre las paredes internas de dos moldes para muffins con las tiras de bacon formando un círculo. Rompa un huevo en el centro de cada círculo. Cubra con el queso y sazone. Hornee a 190°C por 12-15 minutos. El bacon debe quedar crujiente y el huevo cocido." },
    { n: 8, cat: "Desayunos", titulo: "Aguacate Relleno de Huevo", ing: "1 aguacate mediano, 1 huevo duro (cocido), 1 cucharada de queso crema (cream cheese), 1 tallo de apio picado finamente, sal y pimienta.", prep: "Corte el aguacate por la mitad y retire la semilla. En un recipiente, pique el huevo duro y mézclelo con el queso crema y el apio hasta formar una pasta. Rellene el hueco del aguacate con esta mezcla. Puede añadir un toque de aceite de oliva encima." },
    { n: 9, cat: "Desayunos", titulo: "Huevos con Salmón", ing: "2 huevos revueltos, 2 lonjas de salmón ahumado, 1 taza de arúgula fresca, 1 cucharada de queso parmesano rallado, aceite de oliva.", prep: "Prepare los huevos revueltos en una sartén con un poco de aceite o mantequilla. En un plato, cree una base con la arúgula. Coloque los huevos encima y distribuya las lonjas de salmón. Espolvoree el queso parmesano y termine con un chorrito de aceite de oliva." },
    { n: 10, cat: "Desayunos", titulo: "Quiche de Coliflor", ing: "1/2 coliflor mediana, 3 huevos, 1/2 taza de queso mozzarella, albahaca fresca, sal y pimienta.", prep: "Procese la coliflor cruda hasta que tenga consistencia de arroz. Llévela al microondas por 5 minutos o saltéela para eliminar humedad. Mezcle la coliflor con un huevo y un poco de queso para formar una base en un molde. Hornee la base 10 min. Luego vierta los otros 2 huevos batidos con el resto del queso y albahaca. Hornee 15 min más a 180°C." },
    { n: 11, cat: "Desayunos", titulo: "Huevos en Taza", ing: "2 huevos, 1 puñado de espinacas frescas picadas, 2 cucharadas de queso feta desmenuzado, sal y pimienta.", prep: "En una taza grande apta para microondas, coloque las espinacas en el fondo. Rompa los huevos encima, añada el queso feta y sazone. Bata ligeramente con un tenedor para integrar. Cocine en el microondas en intervalos de 1 minuto (usualmente toma de 2 a 3 minutos) hasta que el huevo esté firme." },
    { n: 12, cat: "Desayunos", titulo: "Pancakes de Requesón", ing: "200g de requesón (ricotta), 2 huevos, 1 cucharada de semillas de linaza molida, 1 cucharada de mantequilla o ghee para la sartén.", prep: "En un bowl, mezcle vigorosamente el requesón, los huevos y la linaza hasta que no queden grumos grandes. Deje reposar 5 minutos. Caliente la mantequilla en una sartén y vierta porciones pequeñas de la mezcla. Cocine a fuego bajo hasta que salgan burbujas, voltee con cuidado y dore el otro lado." },
    { n: 13, cat: "Desayunos", titulo: "Berrypancakes", ing: "3 cdas de harina de almendras, 2 huevos, 1 cda de queso crema, 1/4 taza de blueberries (arándanos), extracto de vainilla.", prep: "Licúe la harina de almendras, los huevos, el queso crema y la vainilla. Vierta la mezcla en la sartén caliente. Justo después de verter, coloque los arándanos sobre la masa cruda. Cuando los bordes doren, voltee y cocine por 1 minuto más." },
    { n: 14, cat: "Desayunos", titulo: "Pancakes de Coliflor", ing: "1/2 taza de coliflor cocida al vapor y bien escurrida, 2 huevos, 2 cdas de harina de almendras, 1 cdita de canela, mantequilla.", prep: "Procese o licúe la coliflor con los huevos, la harina y la canela. Asegúrese de que la coliflor no tenga agua. Cocine en una sartén con mantequilla a fuego medio-bajo formando círculos pequeños. Voltee con mucha precaución ya que son más delicados que los tradicionales." },
    { n: 15, cat: "Desayunos", titulo: "Coffee Pancakes", ing: "3 cdas de harina de coco, 2 huevos, 1 cda de queso crema, 1 cdita de café instantáneo en polvo, vainilla.", prep: "Mezcle todos los ingredientes. Si la masa queda demasiado espesa (la harina de coco absorbe mucha humedad), añada una cucharada de agua. Cocine en sartén antiadherente a fuego bajo. Estos pancakes son ideales para los amantes del café." },
    { n: 16, cat: "Desayunos", titulo: "Chocopancakes", ing: "3 cdas de harina de coco, 2 huevos, 1 cda de cacao puro en polvo (sin azúcar), 1 cda de mantequilla derretida.", prep: "Integre los huevos con el cacao y la harina de coco. Añada la mantequilla a la mezcla. Cocine en sartén caliente. El sabor es intenso a chocolate amargo, puede servir con un toque de crema de coco encima." },
    { n: 17, cat: "Desayunos", titulo: "Pancakes de Coco", ing: "3 cdas de harina de coco, 2 huevos, 1 cda de coco rallado sin azúcar, aceite de coco para cocinar.", prep: "Mezcle los ingredientes. El coco rallado le dará una textura crujiente. Cocine en la sartén usando aceite de coco para potenciar el aroma y sabor tropical." },
    { n: 18, cat: "Desayunos", titulo: "Pancakenuts", ing: "2 huevos, 3 cdas de harina de almendras, 1 cda de nueces picadas, canela en polvo, mantequilla.", prep: "Prepare la masa base con huevos y harina. Incorpore las nueces troceadas a la masa antes de llevar a la sartén. Cocine con mantequilla hasta que las nueces suelten su aroma tostado." },
    { n: 19, cat: "Desayunos", titulo: "Pancakes de Brócoli", ing: "2 huevos, 3 cdas de harina de almendras, 1/4 taza de brócoli procesado (solo las copas), ghee o mantequilla.", prep: "Mezcle el brócoli finamente picado con la masa de harina de almendras y huevos. Cocine a fuego medio. Es una excelente opción para incluir vegetales en el desayuno con un sabor salado." },
    { n: 20, cat: "Desayunos", titulo: "Pancakes de Canela", ing: "3 cdas de harina de coco, 2 huevos, 1 cda de queso crema, 2 cditas de canela en polvo, ghee.", prep: "Siga el procedimiento estándar mezclando todo en licuadora. Use bastante canela para un aroma reconfortante. Cocine pequeñas porciones a fuego lento para evitar que se quemen." },
    { n: 21, cat: "Desayunos", titulo: "Avopancakes", ing: "3 cdas de harina de coco, 2 huevos, 1/2 aguacate maduro, esencia de vainilla.", prep: "Licúe el aguacate con los huevos y la harina. El aguacate reemplaza la grasa y aporta una textura increíblemente cremosa. Cocine a fuego muy bajo." },
    { n: 22, cat: "Desayunos", titulo: "Pancakes de Mantequilla", ing: "3 cdas de harina de almendras, 2 huevos, 2 cdas de mantequilla derretida, 1 cda de queso crema.", prep: "Mezcle todos los ingredientes grasos. Estos pancakes no necesitan aceite en la sartén. Son muy saciantes y densos." },

    // --- VEGETALES Y ACOMPAÑAMIENTOS (23-33) ---
    { n: 23, cat: "Vegetales", titulo: "Cereal de Coliflor", ing: "1/2 coliflor rallada cruda, 1/2 taza de leche de coco (de lata, sin azúcar), almendras fileteadas, canela y vainilla.", prep: "Caliente la leche de coco con la canela y vainilla. Agregue la coliflor rallada y cocine solo por 2-3 minutos para que mantenga textura. Sirva en un bowl y decore con las almendras." },
    { n: 24, cat: "Vegetales", titulo: "Hash Brown de Coliflor", ing: "1 coliflor pequeña rallada, 2 huevos, sal, pimienta, aceite de oliva.", prep: "Exprima la coliflor rallada con un paño para sacar todo el agua. Mezcle con los huevos y sazón. Forme tortitas planas y fríalas en aceite de oliva hasta que estén muy crujientes por fuera." },
    { n: 25, cat: "Vegetales", titulo: "Bacon Avocado", ing: "1 aguacate firme, 4-6 tiras de bacon.", prep: "Corte el aguacate en tajadas largas. Envuelva cada tajada con una tira de bacon. Colóquelas en una sartén a fuego medio hasta que el bacon esté crujiente alrededor del aguacate." },
    { n: 26, cat: "Desayunos", titulo: "Aguacate Relleno de Huevo y Salmón", ing: "1 aguacate, 1 huevo pequeño, 2 lonjas de salmón ahumado, eneldo seco.", prep: "Retire la semilla del aguacate y agrande un poco el hueco con una cuchara. Coloque el salmón en el fondo del hueco, rompa el huevo encima. Hornee a 200°C por 10 min. Decore con eneldo." },
    { n: 27, cat: "Vegetales", titulo: "Pastel de Coliflor", ing: "1 coliflor mediana procesada, 2 huevos, 2 cdas de harina de almendras, 1/2 taza de queso parmesano, aceite de oliva.", prep: "Mezcle la coliflor con los huevos, harina y la mitad del queso. Ponga en un molde para horno, cubra con el resto del queso y hornee a 180°C por 20 minutos hasta que gratine." },
    { n: 28, cat: "Vegetales", titulo: "Chocomousse de Aguacate", ing: "1 aguacate muy maduro, 1 cda de cacao puro, 1 cda de coco rallado, unas gotas de stevia (opcional).", prep: "Procese el aguacate con el cacao hasta que sea una crema de chocolate perfecta. Sirva frío y espolvoree el coco rallado por encima." },
    { n: 29, cat: "Vegetales", titulo: "Tortilla de Coliflor con Bacon", ing: "1/2 coliflor rallada, 1 huevo, 2 tiras de bacon picadas, perejil fresco.", prep: "Saltee el bacon con la coliflor. Agregue el huevo batido y el perejil. Cocine como una tortilla española dándole la vuelta con un plato." },
    { n: 30, cat: "Vegetales", titulo: "Hash Brown de Repollo", ing: "2 tazas de repollo (col) rallado, 1 huevo, sal, pimienta y aceite de oliva.", prep: "Mezcle el repollo con el huevo y sazone. Forme discos y fríalos en abundante aceite de oliva a fuego medio hasta que doren bien." },
    { n: 31, cat: "Vegetales", titulo: "Tortillas con Guacamole", ing: "3 cdas harina de almendras, 1 huevo (para la tortilla), 1 aguacate, cilantro, cebolla y limón (para el guacamole).", prep: "Haga una tortilla fina con el huevo y harina de almendras. Prepare un guacamole tradicional machacando el aguacate con los vegetales. Rellene la tortilla." },
    { n: 32, cat: "Vegetales", titulo: "Ensalada con Huevo y Salmón", ing: "Mezcla de lechugas, 1 huevo duro, 2 lonjas de salmón ahumado, aceite de oliva y limón.", prep: "Pique el huevo y el salmón. Mezcle con los verdes y aliñe generosamente con el aceite de oliva y limón." },
    { n: 33, cat: "Vegetales", titulo: "Cheesy Coliflor con Bacon", ing: "1/2 coliflor en arbolitos pequeños, 1/4 taza de mozzarella, 1 cda de mantequilla, bacon picado.", prep: "Cocine la coliflor al vapor. Aún caliente, mezcle con la mantequilla, el queso y el bacon frito para que todo se funda." },

    // --- BEBIDAS/CAFE (34-36) ---
    { n: 34, cat: "Cremas", titulo: "Ketocafé", ing: "1 taza de café negro caliente, 1 cda de mantequilla de pastoreo o ghee.", prep: "Vierta el café y la mantequilla en una licuadora. Licúe a máxima potencia por 15 segundos hasta crear una espuma densa tipo latte." },
    { n: 35, cat: "Cremas", titulo: "Chococafé", ing: "1 taza de café, 1 cdita de aceite de coco, 1 cdita de cacao puro en polvo.", prep: "Licúe todos los ingredientes. El cacao le dará un toque de moca sin necesidad de azúcar." },
    { n: 36, cat: "Cremas", titulo: "Cococafé", ing: "1 taza de café, 1 cdita de aceite de coco, 1 cdita de mantequilla.", prep: "Licúe para obtener una bebida altamente energética y cremosa, ideal para ayunos intermitentes." },

    // --- PROTEÍNAS (37-66) ---
    { n: 37, cat: "Proteínas", titulo: "Pollo a la Mantequilla", ing: "1 pechuga de pollo, 2 dientes de ajo, 2 cdas de mantequilla, sal y pimienta.", prep: "Corte el pollo en cubos. Derrita la mantequilla en una sartén, dore el ajo picado y cocine el pollo hasta que esté bien dorado por fuera y jugoso por dentro." },
    { n: 38, cat: "Vegetales", titulo: "Vainitas con Coco", ing: "200g de vainitas (ejotes), 1 diente de ajo, 1 cda de aceite de coco.", prep: "Saltee las vainitas (previamente blanqueadas en agua hirviendo) en aceite de coco con el ajo hasta que estén brillantes." },
    { n: 39, cat: "Proteínas", titulo: "Pollo al Horno con Hongos", ing: "2 muslos de pollo, 1 taza de champiñones, mantequilla, queso parmesano.", prep: "Ponga el pollo y los hongos en una bandeja. Agregue trozos de mantequilla encima. Hornee 35 min a 200°C. Cubra con parmesano los últimos 5 min." },
    { n: 40, cat: "Proteínas", titulo: "Tortitas de Pollo con Guacamole", ing: "Pollo molido crudo, parmesano, 1/2 aguacate, 1 cda de queso crema.", prep: "Mezcle el pollo molido con el parmesano y forme tortitas. Fríalas. Sirva con una crema hecha de aguacate y queso crema." },

    let currentServings = 1;
    let wakeLock = null;
    let selectedRecipe = null;

    const grid = document.getElementById('recipesGrid');
    const searchInput = document.getElementById('searchInput');

    // Inicializar App
    function init() {
        displayRecipes(recetario);
        setupFilters();
        registerServiceWorker();
    }

    function displayRecipes(data) {
        grid.innerHTML = data.length > 0 ? '' : '<p style="text-align:center; grid-column:1/-1;">No se encontraron recetas.</p>';
        data.forEach(r => {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.onclick = () => openModal(r);
            card.innerHTML = `
                <div class="recipe-number">${r.n}</div>
                <div class="recipe-content">
                    <span class="category-tag">${r.cat}</span>
                    <h3 style="margin-top:10px; font-size:1.1rem;">${r.titulo}</h3>
                    <p style="font-size:0.8rem; color:#666; margin-top:5px;">${r.ing.substring(0, 60)}...</p>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Buscador avanzado (Múltiples palabras)
    searchInput.addEventListener('input', (e) => {
        const terms = e.target.value.toLowerCase().split(' ').filter(t => t !== '');
        const filtered = recetario.filter(r => {
            const content = (r.titulo + r.ing + r.cat).toLowerCase();
            return terms.every(term => content.includes(term));
        });
        displayRecipes(filtered);
    });

    // Filtros por categoría
    function setupFilters() {
        document.getElementById('filtersContainer').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            
            const cat = e.target.dataset.cat;
            const filtered = cat === 'all' ? recetario : recetario.filter(r => r.cat === cat);
            displayRecipes(filtered);
        });
    }

    // Lógica de Escalado de Ingredientes
    function scaleIngredients(text, factor) {
        return text.replace(/(\d+(?:\.\d+)?)/g, (match) => {
            const num = parseFloat(match);
            if (isNaN(num)) return match;
            const result = num * factor;
            return result % 1 === 0 ? result : result.toFixed(1);
        });
    }

    async function openModal(recipe) {
        selectedRecipe = recipe;
        currentServings = 1;
        renderModal();
        document.getElementById('recipeModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';

        // Activar Wake Lock (Pantalla Encendida)
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }

    function renderModal() {
        const body = document.getElementById('modalBody');
        const ingredients = scaleIngredients(selectedRecipe.ing, currentServings);
        
        body.innerHTML = `
            <span class="category-tag">${selectedRecipe.cat}</span>
            <h2 style="color:var(--primary); margin: 10px 0 20px;">${selectedRecipe.titulo}</h2>
            
            <div class="servings-control">
                <span>Porciones para: <strong>${currentServings}</strong></span>
                <div class="servings-btns">
                    <button class="s-btn" onclick="updateServings(-1)">−</button>
                    <button class="s-btn" onclick="updateServings(1)">+</button>
                </div>
            </div>

            <div style="margin-bottom:25px;">
                <h4 style="color:var(--accent); font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;">🛒 Ingredientes</h4>
                <div style="background:#f9f9f9; padding:20px; border-radius:20px; margin-top:10px; line-height:1.8;">
                    ${ingredients}
                </div>
            </div>

            <div>
                <h4 style="color:var(--accent); font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;">👨‍🍳 Preparación</h4>
                <p style="margin-top:10px; color:#444;">${selectedRecipe.prep}</p>
            </div>
        `;
    }

    window.updateServings = (delta) => {
        currentServings = Math.max(1, currentServings + delta);
        renderModal();
    };

    window.closeModal = () => {
        document.getElementById('recipeModal').style.display = 'none';
        document.body.style.overflow = 'auto';
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
    };

    window.handleOutsideClick = (e) => {
        if (e.target.id === 'recipeModal') closeModal();
    };

    window.generateRandomMenu = () => {
        const d = recetario.filter(r => r.cat === "Desayunos");
        const p = recetario.filter(r => r.cat === "Proteínas" || r.cat === "Carnes");
        const randomD = d[Math.floor(Math.random() * d.length)];
        const randomP = p[Math.floor(Math.random() * p.length)];
        
        const res = document.getElementById('menu-result');
        res.style.display = 'block';
        res.innerHTML = `
            <h3 style="color:var(--primary);">🍴 Menú Sugerido</h3>
            <p style="margin-top:8px;"><strong>Mañana:</strong> ${randomD.titulo}</p>
            <p><strong>Tarde/Noche:</strong> ${randomP.titulo}</p>
        `;
        res.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };

    // Registro automático de Service Worker para PWA (Offline)
    function registerServiceWorker() {
        if ('serviceWorker' in navigator) {
            const swCode = `
                const cacheName = 'nutri-v1';
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(cacheName).then(cache => cache.addAll(['./', './index.html'])));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }
    }

    init();
</script>
